<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Xpress Health – Registration Summary</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body {font-family: 'Inter', sans-serif; background:#f5f7fb; margin:0; color:#333;}
    .header {background:#fff; padding:12px 20px; display:flex; justify-content:space-between; align-items:center; box-shadow:0 1px 3px rgba(0,0,0,.08);}
    .logo {height:40px;}
    .logout {color:#e53e3e; font-weight:500; text-decoration:none;}
    .logout:hover {text-decoration:underline;}

    .container {max-width:560px; margin:40px auto; background:#fff; border-radius:12px; overflow:hidden; box-shadow:0 4px 12px rgba(0,0,0,.08);}
    .title {background:#eaf2ff; padding:20px; text-align:center; font-size:20px; font-weight:600; color:#222;}
    .subtitle {text-align:center; font-size:14px; color:#555; margin-top:-8px; padding-bottom:20px;}

    .steps {padding:0 20px;}
    .step {display:flex; align-items:center; padding:14px 16px; border-radius:8px; margin-bottom:12px; background:#f9f9f9; cursor:pointer; transition:all .2s;}
    .step.disabled {opacity:.45; cursor:not-allowed; pointer-events:none;}
    .step.active {background:#397eff; color:#fff;}
    .step .icon {margin-right:12px; font-size:18px;}
    .step .label {flex:1; font-weight:500;}
    .step .arrow {font-size:14px;}

    .bottom {padding:20px; text-align:center;}
    .continue-btn {background:#397eff; color:#fff; border:none; padding:12px 32px; border-radius:8px; font-weight:500; cursor:pointer; width:100%; font-size:16px;}
    .continue-btn:disabled {background:#a0c4ff; cursor:not-allowed;}
  </style>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

<div class="header">
  <img src="/static/image/logo.png" alt="Xpress Health" class="logo">
  <a href="/logout" class="logout">Logout</a>
</div>

<div class="container">
  <div class="title">Registration Summary</div>
  <p class="subtitle">Finish up your registration to join Xpress Health and easily find shifts that match your skills and availability</p>

  <div class="steps" id="stepsList">
    <!-- steps are injected by JS -->
  </div>

  <div class="bottom">
    <button class="continue-btn" id="continueBtn">Continue</button>
  </div>
</div>

<script>
  // ------------------------------------------------------------------
  // 1. Data that comes from the registration call
  // ------------------------------------------------------------------
  const urlParams = new URLSearchParams(window.location.search);
  const userId   = urlParams.get('user_id');          // <-- from /api/register
  const steps = [
    {id:'personal',      label:'Personal Details',          icon:'👤', route:'/register/personal'},
    {id:'permission',   label:'Permission to Work',        icon:'📋', route:'/register/permission'},
    {id:'references',   label:'Professional References',   icon:'📄', route:'/register/references'},
    {id:'compliance',   label:'Compliance and Training',   icon:'📚', route:'/register/compliance'},
    {id:'uniform',      label:'Uniform and Health',        icon:'🩺', route:'/register/uniform'},
    {id:'additional',   label:'Additional Role',           icon:'➕', route:'/register/additional'}
  ];

  // ------------------------------------------------------------------
  // 2. Render steps – only first one is active
  // ------------------------------------------------------------------
  const $list = $('#stepsList');
  steps.forEach((s, idx) => {
    const disabled = idx > 0 ? ' disabled' : '';
    const active   = idx === 0 ? ' active' : '';
    const html = `
      <div class="step${disabled}${active}" data-id="${s.id}" data-route="${s.route}">
        <span class="icon">${s.icon}</span>
        <span class="label">${s.label}</span>
        <span class="arrow">></span>
      </div>`;
    $list.append(html);
  });

  // ------------------------------------------------------------------
  // 3. Click → go to the route (only first step works)
  // ------------------------------------------------------------------
  $list.on('click', '.step:not(.disabled)', function(){
    const route = $(this).data('route');
    // keep user_id in query string for every sub-step
    window.location = `${route}?user_id=${userId}`;
  });

  // ------------------------------------------------------------------
  // 4. Continue button – same as clicking the first step
  // ------------------------------------------------------------------
  $('#continueBtn').on('click', () => {
    const first = steps[0];
    window.location = `${first.route}?user_id=${userId}`;
  });

  // ------------------------------------------------------------------
  // 5. (Optional) Load saved progress from backend
  // ------------------------------------------------------------------
  if (userId) {
    $.get('/api/registration_progress', {user_id: userId})
      .done(data => {
        if (data.current_step) {
          // enable all steps up to the saved one
          const idx = steps.findIndex(s => s.id === data.current_step);
          $('.step').each((i, el) => {
            if (i <= idx) $(el).removeClass('disabled');
            if (i === idx) $(el).addClass('active');
          });
          // enable Continue button
          $('#continueBtn').prop('disabled', false);
        }
      });
  }
</script>
</body>
</html>
