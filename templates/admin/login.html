<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; }
    .login-box {
      max-width: 400px;
      margin: 100px auto;
      padding: 30px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }
    .btn-admin { background: #dc3545; color: white; }
    .btn-admin:hover { background: #c82333; }
  </style>
</head>
<body>
  <div class="login-box">
    <h2 class="text-center mb-4">Admin Login</h2>
    <form id="admin-login-form">
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" id="email" required />
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" id="password" required />
      </div>
      <div id="error" class="text-danger mb-3"></div>
      <button type="submit" class="btn btn-admin w-100">Login as Admin</button>
    </form>
    <div class="text-center mt-3">
      <a href="/" class="text-muted">Back to Public Login</a>
    </div>
  </div>

  <script>
    document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const error = document.getElementById('error');

      try {
        const res = await fetch('/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (res.ok) {
          window.location.href = '/admin';
        } else {
          error.textContent = data.error || 'Login failed';
        }
      } catch (err) {
        error.textContent = 'Network error';
      }
    });
  </script>
</body>
</html>
