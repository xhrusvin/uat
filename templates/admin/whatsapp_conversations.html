{% extends "admin/base.html" %}

{% block title %}WhatsApp Conversations{% endblock %}

{% block content %}

<div class="container-fluid">

    <div class="row">

        <!-- LEFT PANEL -->

        <div class="col-md-4">

            <div class="card shadow-sm">

                <div class="card-header">
                    <strong>Users</strong>
                </div>

                <div class="card-body">

                    <input
                        id="searchInput"
                        class="form-control"
                        placeholder="Search name, email, phone..."
                    >

                    <div
                        id="usersList"
                        class="mt-3"
                        style="
                            max-height:700px;
                            overflow-y:auto;
                        "
                    ></div>

                </div>

            </div>

        </div>

        <!-- RIGHT PANEL -->

        <div class="col-md-8">

            <div class="card shadow-sm">

                <div
                    class="card-header d-flex justify-content-between"
                >
                    <div>
                        <strong id="selectedUser">
                            Select User
                        </strong>
                    </div>

                    <div id="selectedPhone"></div>
                </div>

                <div
                    id="chatContainer"
                    class="card-body"
                    style="
                        height:650px;
                        overflow-y:auto;
                        background:#ece5dd;
                    "
                >
                    <div class="text-center text-muted mt-5">
                        Select a user
                    </div>
                </div>

                <div class="card-footer">

                    <div class="input-group">

                        <input
                            id="messageInput"
                            class="form-control"
                            placeholder="Type a message..."
                        >

                        <button
                            id="sendBtn"
                            class="btn btn-success"
                        >
                            Send
                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

let selectedPhone = null;

const usersList =
    document.getElementById("usersList");

const chatContainer =
    document.getElementById("chatContainer");

const searchInput =
    document.getElementById("searchInput");

const sendBtn =
    document.getElementById("sendBtn");


// SEARCH USERS

let searchTimer = null;

searchInput.addEventListener(
    "keyup",
    function(){

        clearTimeout(searchTimer);

        searchTimer = setTimeout(
            searchUsers,
            300
        );
    }
);

async function searchUsers(){

    const q =
        searchInput.value.trim();

    if(q.length < 2){

        usersList.innerHTML = "";
        return;
    }

    try{

        const response =
            await fetch(
                `/admin/whatsapp_wati/search_users?q=${encodeURIComponent(q)}`
            );

        const data =
            await response.json();

        if(!data.success)
            return;

        renderUsers(data.users);

    }catch(err){

        console.error(err);
    }
}


// RENDER USERS

function renderUsers(users){

    usersList.innerHTML = "";

    if(users.length === 0){

        usersList.innerHTML =
            "<div class='text-muted'>No users found</div>";

        return;
    }

    users.forEach(user => {

        const name =
            `${user.first_name || ""} ${user.last_name || ""}`;

        const phone =
            user.phone || "";

        const div =
            document.createElement("div");

        div.className =
            "border rounded p-2 mb-2";

        div.style.cursor =
            "pointer";

        div.innerHTML = `
            <div>
                <strong>${name}</strong>
            </div>

            <div class="small text-muted">
                ${phone}
            </div>

            <div class="small text-muted">
                ${user.email || ""}
            </div>
        `;

        div.onclick = () => {

            selectedPhone = phone;

            document.getElementById(
                "selectedUser"
            ).innerText = name;

            document.getElementById(
                "selectedPhone"
            ).innerText = phone;

            loadConversation();
        };

        usersList.appendChild(div);
    });
}


// LOAD CHAT

async function loadConversation(){

    if(!selectedPhone)
        return;

    try{

        const response =
            await fetch(
                `/admin/api/whatsapp/conversation?phone=${selectedPhone}`
            );

        const data =
            await response.json();

        if(!data.success)
            return;

        renderMessages(
            data.messages
        );

    }catch(err){

        console.error(err);
    }
}


// RENDER CHAT

function renderMessages(messages){

    chatContainer.innerHTML = "";

    if(messages.length === 0){

        chatContainer.innerHTML = `
            <div class="text-center text-muted">
                No messages
            </div>
        `;

        return;
    }

    messages.forEach(msg => {

        const row =
            document.createElement("div");

        row.className =
            msg.direction === "outbound"
            ? "text-end mb-2"
            : "text-start mb-2";

        row.innerHTML = `

            <div
                class="d-inline-block p-2 rounded shadow-sm"
                style="
                    max-width:75%;
                    background:
                    ${
                        msg.direction === "outbound"
                        ? "#dcf8c6"
                        : "#ffffff"
                    };
                "
            >

                <div>
                    ${escapeHtml(msg.text || "")}
                </div>

                <div
                    class="small text-muted mt-1"
                >
                    ${msg.created_at || ""}
                </div>

            </div>
        `;

        chatContainer.appendChild(row);
    });

    chatContainer.scrollTop =
        chatContainer.scrollHeight;
}


// SEND MESSAGE

sendBtn.addEventListener(
    "click",
    sendMessage
);

document
.getElementById("messageInput")
.addEventListener(
    "keypress",
    function(e){

        if(e.key === "Enter"){

            sendMessage();
        }
    }
);

async function sendMessage(){

    const message =
        document
        .getElementById("messageInput")
        .value
        .trim();

    if(!selectedPhone){

        alert("Select user first");
        return;
    }

    if(!message)
        return;

    try{

        sendBtn.disabled = true;

        const response =
            await fetch(
                "/admin/whatsapp_wati/send_session",
                {
                    method:"POST",
                    headers:{
                        "Content-Type":
                        "application/json"
                    },
                    body:JSON.stringify({
                        phone:selectedPhone,
                        message:message
                    })
                }
            );

        const result =
            await response.json();

        if(!result.success){

            alert(
                result.error || "Send failed"
            );

            return;
        }

        document
        .getElementById("messageInput")
        .value = "";

        await loadConversation();

    }catch(err){

        console.error(err);

    }finally{

        sendBtn.disabled = false;
    }
}


// ESCAPE HTML

function escapeHtml(text){

    const div =
        document.createElement("div");

    div.innerText = text;

    return div.innerHTML;
}


// AUTO REFRESH CHAT EVERY 10 SECONDS

setInterval(() => {

    if(selectedPhone){

        loadConversation();
    }

}, 10000);

</script>

{% endblock %}
