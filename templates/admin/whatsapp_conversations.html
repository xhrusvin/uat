{% extends "admin/base.html" %}
{% block title %}WhatsApp Conversations{% endblock %}
{% block content %}

<style>
.wa-layout {
    display: flex;
    height: calc(100vh - 80px);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 16px rgba(0,0,0,.18);
    margin: 0 12px 12px;
}

/* ── LEFT SIDEBAR ── */
.wa-sidebar {
    width: 360px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    background: #fff;
    border-right: 1px solid #e9edef;
}
.wa-sidebar-header {
    background: #075e54;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
}
.wa-sidebar-header span {
    color: #fff;
    font-weight: 600;
    font-size: 18px;
}
.wa-search-wrap {
    padding: 8px 12px;
    background: #f0f2f5;
    flex-shrink: 0;
}
.wa-search-wrap input {
    width: 100%;
    border: none;
    border-radius: 20px;
    padding: 8px 16px 8px 36px;
    background: #fff;
    font-size: 14px;
    outline: none;
    color: #111;
}
.wa-search-icon {
    position: absolute;
    left: 24px;
    top: 50%;
    transform: translateY(-50%);
    color: #54656f;
    font-size: 15px;
    pointer-events: none;
}
.wa-search-relative { position: relative; }

.wa-section-label {
    padding: 6px 16px 4px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .06em;
    color: #8696a0;
    text-transform: uppercase;
    background: #f0f2f5;
    border-bottom: 1px solid #e9edef;
    flex-shrink: 0;
}

.wa-users-list {
    flex: 1;
    overflow-y: auto;
    background: #fff;
}
.wa-users-list::-webkit-scrollbar { width: 5px; }
.wa-users-list::-webkit-scrollbar-track { background: transparent; }
.wa-users-list::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }

.wa-user-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    cursor: pointer;
    border-bottom: 1px solid #f0f2f5;
    transition: background .12s;
}
.wa-user-row:hover { background: #f5f6f6; }
.wa-user-row.active { background: #f0f2f5; }
.wa-avatar {
    width: 46px; height: 46px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; font-weight: 600; color: #fff;
}
.wa-user-info { flex: 1; min-width: 0; }
.wa-user-name {
    font-weight: 600; font-size: 15px; color: #111;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.wa-user-sub {
    font-size: 13px; color: #667781;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.wa-user-preview {
    font-size: 13px; color: #667781;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    font-style: italic;
}
.wa-user-meta {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
    flex-shrink: 0;
}
.wa-user-time {
    font-size: 11px;
    color: #667781;
    white-space: nowrap;
}
.wa-empty {
    padding: 32px 16px;
    text-align: center;
    color: #aaa;
    font-size: 14px;
}
.wa-spinner {
    padding: 24px 16px;
    text-align: center;
    color: #aaa;
}

/* ── RIGHT CHAT PANEL ── */
.wa-chat {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #f0f2f5;
}
.wa-chat-header {
    background: #075e54;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
}
.wa-chat-header-info { flex: 1; min-width: 0; }
.wa-chat-header-name {
    font-weight: 600; font-size: 16px; color: #fff;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.wa-chat-header-phone { font-size: 13px; color: rgba(255,255,255,.75); }
.wa-chat-header-placeholder {
    background: #075e54;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
}
.wa-chat-header-placeholder span {
    color: rgba(255,255,255,.6);
    font-size: 15px;
}

.wa-messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    background: #e5ddd5;
}
.wa-messages::-webkit-scrollbar { width: 5px; }
.wa-messages::-webkit-scrollbar-thumb { background: #bbb; border-radius: 4px; }

.wa-placeholder {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #667781;
    gap: 12px;
}
.wa-placeholder i { font-size: 64px; opacity: .2; }
.wa-placeholder p { font-size: 14px; margin: 0; }

.wa-date-sep {
    display: flex; justify-content: center; margin: 10px 0 6px;
}
.wa-date-sep span {
    background: rgba(255,255,255,.85);
    color: #54656f;
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 8px;
    box-shadow: 0 1px 1px rgba(0,0,0,.1);
}

.wa-bubble-wrap {
    display: flex;
    margin-bottom: 3px;
}
.wa-bubble-wrap.out { justify-content: flex-end; }
.wa-bubble-wrap.in  { justify-content: flex-start; }

.wa-bubble {
    max-width: 70%;
    padding: 7px 10px 5px;
    border-radius: 8px;
    box-shadow: 0 1px 2px rgba(0,0,0,.13);
    word-break: break-word;
    font-size: 14.5px;
    line-height: 1.45;
    color: #111;
}
.wa-bubble.out { background: #dcf8c6; border-top-right-radius: 2px; }
.wa-bubble.in  { background: #fff;    border-top-left-radius:  2px; }

.wa-bubble-meta {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 3px;
    margin-top: 3px;
}
.wa-bubble-time { font-size: 11px; color: #667781; }
.wa-tick { font-size: 14px; color: #53bdeb; }

/* ── INPUT BAR ── */
.wa-input-bar {
    background: #f0f2f5;
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
    border-top: 1px solid #e9edef;
}
.wa-input-bar input {
    flex: 1;
    border: none;
    border-radius: 24px;
    padding: 10px 18px;
    font-size: 15px;
    outline: none;
    background: #fff;
    color: #111;
}
.wa-send-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: #075e54;
    border: none;
    color: #fff;
    font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background .15s;
    flex-shrink: 0;
}
.wa-send-btn:hover  { background: #128c7e; }
.wa-send-btn:disabled { background: #aaa; cursor: not-allowed; }
</style>

<div class="wa-layout">

    <!-- ── SIDEBAR ── -->
    <div class="wa-sidebar">

        <div class="wa-sidebar-header">
            <span>WhatsApp</span>
            <i class="bi bi-whatsapp text-white fs-5"></i>
        </div>

        <div class="wa-search-wrap">
            <div class="wa-search-relative">
                <i class="bi bi-search wa-search-icon"></i>
                <input id="searchInput" placeholder="Search name, phone, email…">
            </div>
        </div>

        <div id="sectionLabel" class="wa-section-label">Recent conversations</div>

        <div class="wa-users-list" id="usersList">
            <div class="wa-spinner">
                <div class="spinner-border spinner-border-sm text-secondary" role="status"></div>
                <span class="ms-2" style="font-size:13px;">Loading…</span>
            </div>
        </div>

    </div>

    <!-- ── CHAT PANEL ── -->
    <div class="wa-chat">

        <div class="wa-chat-header" id="chatHeader" style="display:none;">
            <div id="chatHeaderAvatar" class="wa-avatar" style="width:40px;height:40px;font-size:15px;"></div>
            <div class="wa-chat-header-info">
                <div class="wa-chat-header-name" id="selectedUser">—</div>
                <div class="wa-chat-header-phone" id="selectedPhone"></div>
            </div>
        </div>

        <div class="wa-chat-header-placeholder" id="chatHeaderPlaceholder">
            <i class="bi bi-whatsapp text-white opacity-50 fs-5"></i>
            <span>Select a conversation</span>
        </div>

        <div class="wa-messages" id="chatContainer">
            <div class="wa-placeholder">
                <i class="bi bi-chat-dots"></i>
                <p>Select a conversation to start chatting</p>
            </div>
        </div>

        <div class="wa-input-bar">
            <input id="messageInput" placeholder="Type a message…">
            <button class="wa-send-btn" id="sendBtn" disabled title="Send">
                <i class="bi bi-send-fill"></i>
            </button>
        </div>

    </div>

</div>

<script>
let selectedPhone = null;
let activeRow = null;
let recentContacts = [];   // cache of the 10 recent contacts

const AVATAR_COLORS = ['#e53935','#8e24aa','#1e88e5','#00897b','#f4511e','#6d4c41','#546e7a','#d81b60','#3949ab','#00acc1'];

function avatarColor(str) {
    let h = 0;
    for (let i = 0; i < str.length; i++) h = str.charCodeAt(i) + ((h << 5) - h);
    return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
}
function initials(name) {
    const p = (name || '').trim().split(' ').filter(Boolean);
    return ((p[0]?.[0] || '') + (p[1]?.[0] || '')).toUpperCase();
}
function fmtTime(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    const now = new Date();
    const isToday = d.toDateString() === now.toDateString();
    if (isToday) return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    return d.toLocaleDateString([], {day:'numeric', month:'short'});
}

// ── LOAD RECENT CONVERSATIONS ────────────────────────────────────────────────
async function loadRecentConversations() {
    try {
        const res  = await fetch('/admin/api/whatsapp/recent_conversations');
        const data = await res.json();
        if (!data.success) throw new Error(data.error);
        recentContacts = data.contacts || [];
        renderUsers(recentContacts, 'recent');
    } catch(err) {
        console.error(err);
        document.getElementById('usersList').innerHTML =
            '<div class="wa-empty"><i class="bi bi-exclamation-circle d-block fs-3 mb-2 opacity-25"></i>Could not load conversations</div>';
    }
}

// ── SEARCH ───────────────────────────────────────────────────────────────────
let searchTimer = null;
document.getElementById('searchInput').addEventListener('keyup', function() {
    clearTimeout(searchTimer);
    const q = this.value.trim();
    if (!q) {
        document.getElementById('sectionLabel').textContent = 'Recent conversations';
        renderUsers(recentContacts, 'recent');
        return;
    }
    searchTimer = setTimeout(() => searchUsers(q), 300);
});

async function searchUsers(q) {
    if (q.length < 2) return;
    document.getElementById('sectionLabel').textContent = 'Search results';
    try {
        const res  = await fetch(`/admin/whatsapp_wati/search_users?q=${encodeURIComponent(q)}`);
        const data = await res.json();
        if (!data.success) return;
        // Map search results to same shape as recentContacts
        const mapped = (data.users || []).map(u => ({
            phone:      u.phone || '',
            name:       `${u.first_name || ''} ${u.last_name || ''}`.trim() || u.phone || '',
            first_name: u.first_name || '',
            last_name:  u.last_name  || '',
            email:      u.email || '',
            last_seen:  '',
            last_message: '',
        }));
        renderUsers(mapped, 'search');
    } catch(err) { console.error(err); }
}

// ── RENDER USER ROWS ─────────────────────────────────────────────────────────
function renderUsers(users, mode) {
    const list = document.getElementById('usersList');
    list.innerHTML = '';

    if (!users.length) {
        list.innerHTML = mode === 'search'
            ? '<div class="wa-empty">No users found</div>'
            : '<div class="wa-empty"><i class="bi bi-chat-dots d-block fs-3 mb-2 opacity-25"></i>No recent conversations</div>';
        return;
    }

    users.forEach(user => {
        const name  = user.name || `${user.first_name || ''} ${user.last_name || ''}`.trim() || 'Unknown';
        const phone = user.phone || '';
        const color = avatarColor(name);
        const ini   = initials(name);

        const row = document.createElement('div');
        row.className = 'wa-user-row';
        row.innerHTML = `
            <div class="wa-avatar" style="background:${color};">${ini}</div>
            <div class="wa-user-info">
                <div class="wa-user-name">${escapeHtml(name)}</div>
                <div class="${user.last_message ? 'wa-user-preview' : 'wa-user-sub'}">
                    ${user.last_message ? escapeHtml(user.last_message) : escapeHtml(phone)}
                </div>
            </div>
            ${user.last_seen ? `
            <div class="wa-user-meta">
                <span class="wa-user-time">${fmtTime(user.last_seen)}</span>
            </div>` : ''}`;

        row.onclick = () => selectUser(row, user, name, phone, color, ini);
        list.appendChild(row);

        // Re-highlight if this was the previously selected user
        if (phone && phone === selectedPhone) {
            row.classList.add('active');
            activeRow = row;
        }
    });
}

function selectUser(row, user, name, phone, color, ini) {
    if (activeRow) activeRow.classList.remove('active');
    row.classList.add('active');
    activeRow = row;

    selectedPhone = phone;
    document.getElementById('selectedUser').textContent  = name;
    document.getElementById('selectedPhone').textContent = phone;

    const hdrAvatar = document.getElementById('chatHeaderAvatar');
    hdrAvatar.textContent   = ini;
    hdrAvatar.style.background = color;

    document.getElementById('chatHeader').style.display            = '';
    document.getElementById('chatHeaderPlaceholder').style.display = 'none';
    document.getElementById('sendBtn').disabled = false;

    loadConversation();
}

// ── LOAD & RENDER CHAT ───────────────────────────────────────────────────────
async function loadConversation() {
    if (!selectedPhone) return;
    try {
        const res  = await fetch(`/admin/api/whatsapp/conversation?phone=${selectedPhone}`);
        const data = await res.json();
        if (!data.success) return;
        renderMessages(data.messages);
    } catch(err) { console.error(err); }
}

function renderMessages(messages) {
    const box = document.getElementById('chatContainer');
    box.innerHTML = '';

    if (!messages.length) {
        box.innerHTML = '<div class="wa-placeholder"><i class="bi bi-chat"></i><p>No messages yet</p></div>';
        return;
    }

    let lastDate = null;

    messages.forEach(msg => {
        const isOut  = msg.direction === 'outbound';
        const msgDate = msg.created_at ? new Date(msg.created_at) : null;
        const time   = msgDate ? msgDate.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '';

        if (msgDate) {
            const dateKey = msgDate.toDateString();
            if (dateKey !== lastDate) {
                lastDate = dateKey;
                const label = msgDate.toLocaleDateString([], {weekday:'long', day:'numeric', month:'long', year:'numeric'});
                const sep = document.createElement('div');
                sep.className = 'wa-date-sep';
                sep.innerHTML = `<span>${label}</span>`;
                box.appendChild(sep);
            }
        }

        const wrap = document.createElement('div');
        wrap.className = `wa-bubble-wrap ${isOut ? 'out' : 'in'}`;
        wrap.innerHTML = `
            <div class="wa-bubble ${isOut ? 'out' : 'in'}">
                <div>${escapeHtml(msg.text || '')}</div>
                <div class="wa-bubble-meta">
                    <span class="wa-bubble-time">${time}</span>
                    ${isOut ? '<span class="wa-tick">&#10003;&#10003;</span>' : ''}
                </div>
            </div>`;
        box.appendChild(wrap);
    });

    box.scrollTop = box.scrollHeight;
}

// ── SEND ─────────────────────────────────────────────────────────────────────
document.getElementById('sendBtn').addEventListener('click', sendMessage);
document.getElementById('messageInput').addEventListener('keypress', e => {
    if (e.key === 'Enter') sendMessage();
});

async function sendMessage() {
    const input   = document.getElementById('messageInput');
    const message = input.value.trim();
    if (!selectedPhone || !message) return;
    const btn = document.getElementById('sendBtn');
    try {
        btn.disabled = true;
        const res = await fetch('/admin/whatsapp_wati/send_session', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({phone: selectedPhone, message})
        });
        const result = await res.json();
        if (!result.success) { alert(result.error || 'Send failed'); return; }
        input.value = '';
        await loadConversation();
    } catch(err) {
        console.error(err);
    } finally {
        btn.disabled = false;
    }
}

// ── ESCAPE ───────────────────────────────────────────────────────────────────
function escapeHtml(text) {
    const d = document.createElement('div');
    d.innerText = text;
    return d.innerHTML;
}

// ── BOOT ─────────────────────────────────────────────────────────────────────
loadRecentConversations();

// Auto-refresh chat every 10s
setInterval(() => { if (selectedPhone) loadConversation(); }, 10000);
</script>

{% endblock %}
