server {
    listen 8051;
    server_name _;

    # Serve React app under /xnadmin/
    location /xnadmin/ {
        alias /usr/share/nginx/html/xnadmin/;
        try_files $uri $uri/ /xnadmin/index.html;
        index index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
