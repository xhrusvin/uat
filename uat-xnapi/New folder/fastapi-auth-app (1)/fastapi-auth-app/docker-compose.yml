services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
      args:
        API_PORT: ${API_PORT:-8050}
    container_name: uat-xnapi-api
    restart: unless-stopped
    network_mode: host
    environment:
      MONGODB_URI: ${MONGODB_URI:-mongodb://127.0.0.1:27017}
      MONGODB_DB: ${MONGODB_DB:-xpress_health_uat}
      API_KEY: ${API_KEY:-xh-uat-9f4a2c8b1d6e3f7a0b5c9d2e4f8a1b3c}
      SECRET_KEY: ${SECRET_KEY:-xh-jwt-secret-7f3a9c2d1e8b4f6a0c5d3e7b9f2a4c8d}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      API_PORT: ${API_PORT:-8050}
      SHIFT_URL: ${SHIFT_URL:-https://uat.shift-xpresshealth.webc.in/api/}
      SHIFT_INTERNAL_API_KEY: ${SHIFT_INTERNAL_API_KEY:-ZDGnj76YJDfg56Ij7YNBkm7Yvfh67B}
      USER_API_URL: ${USER_API_URL:-https://uat.user-xpresshealth.webc.in/api/}
      USER_INTERNAL_API_KEY: ${USER_INTERNAL_API_KEY:-HGvB67Hju7TGV8KA8Qah678HIkNH7M}
      USER_EXTERNAL_API_KEY: ${USER_EXTERNAL_API_KEY:-TER34FCVJGU1NVSlBWVjlEVDSGY554}
      APP_COUNTRY: ${APP_COUNTRY:-ie}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
