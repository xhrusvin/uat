services:

  # ── FastAPI application ──────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: fastapi_app
    restart: unless-stopped
    ports:
      - "80:8000"
    environment:
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB: ${MONGODB_DB:-xpress_health_uat}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-min-32-chars!!}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - app_network

  # ── MongoDB ───────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: mongo
    restart: unless-stopped
    ports:
      - "27017:27017"       # expose locally so Compass / mongosh can connect
    environment:
      MONGO_INITDB_DATABASE: xpress_health_uat
    volumes:
      - mongo_data:/data/db
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s


volumes:
  mongo_data:

networks:
  app_network:
    driver: bridge
