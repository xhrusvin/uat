services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: fastapi_app
    restart: unless-stopped
    network_mode: host
    environment:
      MONGODB_URI: mongodb://127.0.0.1:27017
      MONGODB_DB: ${MONGODB_DB:-xpress_health_uat}
      API_KEY: ${API_KEY:-xh-uat-9f4a2c8b1d6e3f7a0b5c9d2e4f8a1b3c}
