services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: fastapi_app
    restart: unless-stopped
    ports:
      - "8050:8000"
    environment:
      MONGODB_URI: mongodb://172.17.0.1:27017
      MONGODB_DB: ${MONGODB_DB:-xpress_health_uat}
      API_KEY: ${API_KEY:-change-me}
    extra_hosts:
      - "host.docker.internal:host-gateway"   # lets container reach host MongoDB
    networks:
      - app_network

networks:
  app_network:
    driver: bridge
