services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
      args:
        API_PORT: ${API_PORT:-8050}
    container_name: fastapi_app
    restart: unless-stopped
    network_mode: host
    environment:
      MONGODB_URI: ${MONGODB_URI:-mongodb://127.0.0.1:27017}
      MONGODB_DB: ${MONGODB_DB:-xpress_health_uat}
      API_KEY: ${API_KEY:-xh-uat-9f4a2c8b1d6e3f7a0b5c9d2e4f8a1b3c}
      SECRET_KEY: ${SECRET_KEY:-xh-jwt-secret-7f3a9c2d1e8b4f6a0c5d3e7b9f2a4c8d}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      API_PORT: ${API_PORT:-8050}
