<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Certificate Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=UnifrakturCook:wght@700&family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }

    body { 
      margin: 0;
      padding: 24px;
      background: #f4f4f4;
      font-family: Poppins, Arial, sans-serif;
      color: #111;
    }

    .controls {
      max-width: 1100px;
      margin: 0 auto 20px;
      background: #fff;
      padding: 16px;
      border-radius: 10px;
      box-shadow: 0 3px 14px rgba(0,0,0,0.08);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      align-items: end;
    }

    .field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }

    button {
      padding: 11px 16px;
      border: 0;
      border-radius: 6px;
      background: #111;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover { opacity: .88; }

    .certificate-wrap {
      width: 1123px;
      height: 794px;
      margin: auto;
      background: #fff;
      padding: 42px;
      position: relative;
      box-shadow: 0 4px 20px rgba(0,0,0,.12);
    }

    .certificate {
      width: 100%;
      height: 100%;
      border: 3px solid #b57931;
      position: relative;
      padding: 52px 86px 30px;
      text-align: center;
    }

    .certificate:before {
      content: "";
      position: absolute;
      inset: 9px;
      border: 2px solid #e3c047;
      pointer-events: none;
    }

    .logo {
      position: absolute;
      top: 48px;
      right: 82px;
      font-size: 25px;
      line-height: .8;
      font-weight: 800;
      text-align: left;
      letter-spacing: -1.5px;
    }

    .title {
      margin-top: 94px;
      font-family: UnifrakturCook, Georgia, serif;
      font-size: 64px;
      color: #bf7b2f;
      letter-spacing: 1px;
      font-weight: 700;
    }

    .subtitle {
      margin-top: 18px;
      font-size: 24px;
      letter-spacing: .4px;
      font-weight: 400;
    }

    .student-name {
      display: inline-block;
      margin-top: 20px;
      min-width: 470px;
      border-bottom: 2px solid #999;
      padding: 0 40px 8px;
      font-family: Great Vibes, cursive;
      font-size: 66px;
      line-height: 1;
    }

    .completed {
      margin-top: 56px;
      font-size: 15px;
      letter-spacing: .2px;
    }

    .course {
      margin-top: 6px;
      font-family: Playfair Display, Georgia, serif;
      font-size: 25px;
      font-weight: 700;
      letter-spacing: 3px;
    }

    .bottom-row {
      position: absolute;
      left: 86px;
      right: 86px;
      bottom: 64px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 70px;
      align-items: end;
    }

    .bottom-item .value {
      font-size: 18px;
      font-weight: 700;
      min-height: 48px;
      display: flex;
      align-items: end;
      justify-content: center;
      padding-bottom: 10px;
      border-bottom: 1px solid #ccc;
    }

    .bottom-item .label {
      margin-top: 12px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 5px;
    }

    .signature {
      font-family: Great Vibes, cursive;
      font-size: 72px !important;
      font-weight: 400 !important;
      line-height: .5;
    }

    .expiry {
      position: absolute;
      bottom: 24px;
      left: 0;
      right: 0;
      font-size: 12px;
      letter-spacing: 5px;
    }

    @media print {
      @page { size: A4 landscape; margin: 0; }
      body { padding: 0; background: #fff; }
      .controls { display: none; }
      .certificate-wrap {
        width: 100vw;
        height: 100vh;
        box-shadow: none;
        padding: 38px;
      }
    }

    @media (max-width: 1180px) {
      .certificate-wrap { transform: scale(.8); transform-origin: top center; margin-bottom: -140px; }
      .controls { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

  <div class="controls">
    <div class="field">
      <label for="nameInput">Candidate Name</label>
      <input id="nameInput" type="text" value="Emma Lannon" />
    </div>

    <div class="field">
      <label for="dateInput">Issued Date</label>
      <input id="dateInput" type="date" value="2026-05-25" />
    </div>

    <div class="field">
      <label for="instructorInput">Instructor Name</label>
      <input id="instructorInput" type="text" value="Sunil Varghese" />
    </div>

    <button onclick="window.print()">Download / Print PDF</button>
  </div>

  <div class="certificate-wrap">
    <div class="certificate">
      <div class="logo">Care<br>Learning</div>

      <div class="title">Certificate of Achievement</div>
      <div class="subtitle">This is to Certify that</div>
      <div class="student-name" id="nameText">Emma Lannon</div>

      <div class="completed">has successfully completed</div>
      <div class="course">PATIENT MOVING &amp; HANDLING TRAINING</div>

      <div class="bottom-row">
        <div class="bottom-item">
          <div class="value" id="instructorText">Sunil Varghese</div>
          <div class="label">INSTRUCTOR NAME</div>
        </div>

        <div class="bottom-item">
          <div class="value" id="dateText">25 May 2026</div>
          <div class="label">ISSUED DATE</div>
        </div>

        <div class="bottom-item">
          <img src="https://uat.expresshealth.ie/static/image/sig1.png" width="100px" alt="signature"> 
          <div class="value signature"></div>
          <div class="label">SIGNATURE</div>
        </div>
      </div>

      <div class="expiry">Expiry date is 3 years from the issued date</div>
    </div>
  </div>

  <script>
    const nameInput = document.getElementById('nameInput');
    const dateInput = document.getElementById('dateInput');
    const instructorInput = document.getElementById('instructorInput');

    const nameText = document.getElementById('nameText');
    const dateText = document.getElementById('dateText');
    const instructorText = document.getElementById('instructorText');

    function formatDate(dateValue) {
      if (!dateValue) return '';
      const date = new Date(dateValue + 'T00:00:00');
      return date.toLocaleDateString('en-GB', {
        day: '2-digit',
        month: 'long',
        year: 'numeric'
      }).replace(/^0/, '');
    }

    function updateCertificate() {
      nameText.textContent = nameInput.value || 'Emma Lannon';
      instructorText.textContent = instructorInput.value || 'Sunil Varghese';
      dateText.textContent = formatDate(dateInput.value) || '25 May 2026';
    }

    nameInput.addEventListener('input', updateCertificate);
    dateInput.addEventListener('change', updateCertificate);
    instructorInput.addEventListener('input', updateCertificate);

    updateCertificate();
  </script>
</body>
</html>
